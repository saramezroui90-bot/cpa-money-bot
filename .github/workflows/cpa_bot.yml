name: USA_CPA_MONEY_MACHINE_NONSTOP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer-core

      - name: Execution Loop
        run: |
          end=$((SECONDS+20000)) 
          while [ $SECONDS -lt $end ]; do
            node cpa_bot.js
            sleep 600
          done
